services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - extractor

  extractor:
    build:
      context: ./apps/extractor
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
