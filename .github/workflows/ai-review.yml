name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        run: git diff origin/${{ github.base_ref }}...HEAD > pr.diff

      - name: Check if Claude authored commits
        id: claude_check
        run: |
          COUNT=$(git log origin/${{ github.base_ref }}...HEAD --format="%B" | grep -ic "co-authored-by: claude" || true)
          echo "claude_authored=$COUNT" >> $GITHUB_OUTPUT

      - name: Review with Claude
        if: steps.claude_check.outputs.claude_authored == '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/ai_review.py
